<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <article class="card">
        <img src="./assets/images/avatar.png" alt="Rémi's avatar" />
        <h1>Rémi P</h1>
        <h2>Paris, France</h2>
        <q>"Front-end developer and avid reader."</q>
        <nav>
          <ul class="card__links">
            <li>
              <a
                href="https://github.com/RemiPish"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="GitHub (opens in a new tab)"
                >GitHub</a
              >
            </li>
            <li>
              <a
                href="https://www.frontendmentor.io/profile/RemiPish"
                target="_blank"
                aria-label="Frontend Mentor (opens in a new tab)"
                >Frontend Mentor</a
              >
            </li>
            <li>
              <a
                href="https://www.linkedin.com//"
                target="_blank"
                aria-label="LinkedIn (opens in a new tab)"
                >LinkedIn</a
              >
            </li>
            <li>
              <a
                href="https://twitter.com/"
                target="_blank"
                aria-label="Twitter (opens in a new tab)"
                >Twitter</a
              >
            </li>
            <li>
              <a
                href="https://www.instagram.com/"
                target="_blank"
                aria-label="Instagram (opens in a new tab)"
                >Instagram</a
              >
            </li>
          </ul>
        </nav>
      </article>
    </main>
    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a href="https://github.com/RemiPish" target="_blank">Rémi P</a>.
      </div>
    </footer>
  </body>
</html>
